<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <!-- Faithful preview of the live web UI (python webapp.py). A real Chromium
       screenshot is auto-captured in CI on every UI change. -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f9cf9"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="660" fill="#0a0e14"/>

  <!-- Header -->
  <rect width="1200" height="54" fill="#0e131c"/>
  <line x1="0" y1="54" x2="1200" y2="54" stroke="#2a3445"/>
  <text x="24" y="34" font-size="19" font-weight="800" fill="url(#brand)">⚛ Q-Trace Pro</text>
  <text x="190" y="34" font-size="12.5" fill="#8b98a9">Deterministic · local-only · no-LLM Python security auditor</text>
  <rect x="980" y="16" width="92" height="22" rx="11" fill="none" stroke="#2a3445"/><text x="994" y="31" font-size="11" fill="#8b98a9">engines: 6 ✅</text>
  <rect x="1080" y="16" width="96" height="22" rx="11" fill="none" stroke="#214a30"/><text x="1092" y="31" font-size="11" fill="#9be6b0">SARIF · CWE</text>

  <!-- Results card -->
  <rect x="16" y="70" width="1168" height="574" rx="12" fill="#121821" stroke="#2a3445"/>
  <line x1="16" y1="106" x2="1184" y2="106" stroke="#2a3445"/>
  <text x="34" y="92" font-size="12" font-weight="800" fill="#8b98a9" letter-spacing="0.7">🛡️ AUDIT RESULTS</text>
  <text x="980" y="92" font-size="11.5" fill="#8b98a9">target: credential-exfil (2 files)</text>

  <!-- metric strip -->
  <g>
    <rect x="34" y="122" width="216" height="62" rx="10" fill="#1a212e" stroke="#2a3445"/><text x="48" y="155" font-size="23" font-weight="800" fill="#e6edf3">2</text><text x="48" y="174" font-size="10.5" fill="#8b98a9">FINDINGS</text>
    <rect x="262" y="122" width="216" height="62" rx="10" fill="#1a212e" stroke="#2a3445"/><text x="276" y="155" font-size="23" font-weight="800" fill="#b3122a">9.3</text><text x="276" y="174" font-size="10.5" fill="#8b98a9">MAX CVSS</text>
    <rect x="490" y="122" width="216" height="62" rx="10" fill="#1a212e" stroke="#2a3445"/><text x="504" y="155" font-size="23" font-weight="800" fill="#e6edf3">2</text><text x="504" y="174" font-size="10.5" fill="#8b98a9">FILES</text>
    <rect x="718" y="122" width="216" height="62" rx="10" fill="#1a212e" stroke="#2a3445"/><text x="732" y="155" font-size="23" font-weight="800" fill="#e6edf3">3.4</text><text x="732" y="174" font-size="10.5" fill="#8b98a9">AST ENTROPY</text>
    <rect x="946" y="122" width="222" height="62" rx="10" fill="#1a212e" stroke="#2a3445"/><text x="960" y="155" font-size="23" font-weight="800" fill="#e6edf3">7.2<tspan font-size="12"> ms</tspan></text><text x="960" y="174" font-size="10.5" fill="#8b98a9">SCAN TIME</text>
  </g>
  <!-- severity bar -->
  <rect x="34" y="198" width="1134" height="9" rx="5" fill="#222b3a"/>
  <rect x="34" y="198" width="567" height="9" rx="5" fill="#b3122a"/>
  <text x="34" y="226" font-size="11.5" fill="#8b98a9">● <tspan fill="#e6edf3" font-weight="700">2 Critical</tspan>  (credential exfiltration · cross-file)</text>

  <!-- result tabs -->
  <g font-size="13" font-weight="700">
    <text x="34" y="262" fill="#e6edf3">Findings</text><rect x="98" y="251" width="22" height="15" rx="7" fill="#222b3a"/><text x="103" y="262" font-size="10" fill="#8b98a9">2</text>
    <line x1="34" y1="272" x2="120" y2="272" stroke="#4f9cf9" stroke-width="2"/>
    <text x="142" y="262" fill="#8b98a9">Data flow</text><rect x="214" y="251" width="20" height="15" rx="7" fill="#222b3a"/><text x="219" y="262" font-size="10" fill="#8b98a9">1</text>
    <text x="256" y="262" fill="#8b98a9">Engines</text><rect x="320" y="251" width="20" height="15" rx="7" fill="#222b3a"/><text x="325" y="262" font-size="10" fill="#8b98a9">6</text>
    <text x="360" y="262" fill="#8b98a9">Metrics</text>
    <text x="430" y="262" fill="#8b98a9">Provenance</text>
  </g>
  <line x1="16" y1="272" x2="1184" y2="272" stroke="#2a3445"/>

  <!-- finding card -->
  <rect x="34" y="288" width="1134" height="150" rx="9" fill="#1a212e" stroke="#2a3445"/>
  <rect x="34" y="288" width="4" height="150" fill="#b3122a"/>
  <text x="52" y="316" font-size="15" font-weight="700" fill="#e6edf3">Credential / Data Exfiltration</text>
  <rect x="52" y="328" width="70" height="21" rx="10" fill="#b3122a"/><text x="64" y="343" font-size="11" font-weight="800" fill="#fff">Critical</text>
  <rect x="130" y="328" width="72" height="21" rx="6" fill="none" stroke="#2a3445"/><text x="140" y="343" font-size="10.5" fill="#8b98a9">CVSS 9.3</text>
  <rect x="210" y="328" width="72" height="21" rx="6" fill="none" stroke="#2a3445"/><text x="220" y="343" font-size="10.5" fill="#4f9cf9">CWE-200</text>
  <text x="292" y="343" font-size="11" fill="#8b98a9">conf High</text>
  <text x="360" y="343" font-family="monospace" font-size="11" fill="#4f9cf9">client.py:4</text>
  <text x="52" y="372" font-size="12.5" fill="#c9d4e0">Environment variables / secrets are passed into an outbound network call.</text>
  <rect x="52" y="382" width="1098" height="24" rx="6" fill="#070b11" stroke="#2a3445"/>
  <text x="62" y="398" font-family="monospace" font-size="11.5" fill="#9fb3c8">↳ cross-file taint: secret returned by u.collect() reaches network sink requests.post() here</text>
  <text x="52" y="426" font-size="12" fill="#8b98a9">💡 Never transmit raw environment/credentials off-host; remove the exfiltration path.</text>

  <!-- engines / self-healing strip -->
  <text x="34" y="474" font-size="11.5" font-weight="700" fill="#8b98a9">SELF-HEALING ENGINE HEALTH</text>
  <g font-size="11.5" fill="#cfe0d6">
    <rect x="34"  y="486" width="178" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="48" y="507">✅ pattern_matcher · healthy</text>
    <rect x="222" y="486" width="150" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="236" y="507">✅ quantum · healthy</text>
    <rect x="382" y="486" width="150" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="396" y="507">✅ symbolic · healthy</text>
    <rect x="542" y="486" width="168" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="556" y="507">✅ classic_rules · healthy</text>
    <rect x="720" y="486" width="160" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="734" y="507">✅ obfuscation · healthy</text>
    <rect x="890" y="486" width="150" height="34" rx="8" fill="#1a212e" stroke="#2a3445"/><text x="904" y="507">✅ ast_parser · healthy</text>
  </g>

  <!-- provenance line -->
  <line x1="16" y1="546" x2="1184" y2="546" stroke="#2a3445"/>
  <text x="34" y="572" font-size="11.5" fill="#8b98a9">Provenance · report SHA-256: <tspan font-family="monospace" fill="#cfe0d6">6e2c52677137a9b4…</tspan>  (tamper-evident, hash-chained ledger)</text>
  <text x="34" y="600" font-size="11.5" fill="#8b98a9">Symbolic proof: <tspan fill="#9be6b0">SAFE — no unconditional reachable sink</tspan>   ·   Input: paste · upload files · upload folder/.zip (size-limited)</text>
  <text x="34" y="626" font-size="11" fill="#5e6b7d">Immune to prompt-injection scanner-evasion (no LLM) · also flags AI_SCANNER_EVASION attempts</text>
</svg>
